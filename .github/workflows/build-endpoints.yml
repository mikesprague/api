name: Build Endpoints

on:
  push:
    branches:
      - main

  schedule:
    - cron: "5 */6 * * *" # national day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OUTPUT_FILE_DIR: "dist/"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 👷  Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗️ Setup Bun environment
        id: setup-bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: ⚡  Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ steps.setup-bun.outputs.bun-version }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ steps.setup-bun.outputs.bun-version }}-

      - name: ⬆️ Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install

      - name: ⚡ Cache national day data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: national-day-cache
        with:
          path: ${{ env.OUTPUT_FILE_DIR }}national-day/
          key: ${{ runner.os }}-national-day-${{ steps.setup-bun.outputs.bun-version }}-${{ hashFiles('**/national-day/index.json') }}
          restore-keys: |
            ${{ runner.os }}-national-day-${{ steps.setup-bun.outputs.bun-version }}-

      - name: 🛠️ Run script to generate national day data
        if: github.event.schedule == '5 */6 * * *' || github.event_name == 'workflow_dispatch'
        run: bun run national-day

      - name: 🛠️ Run script to generate trending repo data
        run: bun run github-trending-repos

      - name: 🛠️ Run script to generate documentation
        if: always()
        run: bun run typedoc-html

      - name: 📦 Create and upload build artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-endpoints
          path: ${{ env.OUTPUT_FILE_DIR }}
          retention-days: 1

  call-deploy-workflow:
    needs: [build]
    if: always()
    uses: mikesprague/reusable-workflows/.github/workflows/pages-deploy.yml@main
    secrets:
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN}}
    with:
      artifact-name: api-endpoints
      file-name: docs/
